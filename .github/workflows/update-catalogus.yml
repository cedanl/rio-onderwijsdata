name: Update catalogus site

on:
  push:
    branches: [main]
    paths:
      - data/02-prepared/rio_resources_ai.json
      - voorbeelden/manifest.json
      - voorbeelden/output/**

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Kopieer resources naar docs/
        run: cp data/02-prepared/rio_resources_ai.json docs/data.json

      - name: Kopieer en flatten voorbeelden naar docs/voorbeelden/
        run: |
          mkdir -p docs/voorbeelden

          # Kopieer manifest
          cp voorbeelden/manifest.json docs/voorbeelden.json

          # Kopieer alle plots (flatten subdirectories)
          find voorbeelden/output -name "*.png" -exec cp {} docs/voorbeelden/ \;

          # Kopieer INTERPRETATIE.md bestanden — flatten subdir-namen
          find voorbeelden/output -name "*INTERPRETATIE.md" | while read f; do
            filename=$(basename "$f")
            dir=$(basename "$(dirname "$f")")
            if [ "$filename" = "INTERPRETATIE.md" ]; then
              cp "$f" "docs/voorbeelden/${dir}_INTERPRETATIE.md"
            else
              cp "$f" "docs/voorbeelden/$filename"
            fi
          done

      - name: Commit docs/
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --staged --quiet || (git commit -m "chore: update catalogus site" && git push)
