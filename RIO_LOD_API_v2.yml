openapi: 3.0.0
info:
  title: RIO LOD API
  description: "De RIO API is een RESTful webservice conform het HATEOAS principe die applicaties in staat stelt om gegevens uit Registratie Instellingen en Opleidingen (RIO) op te halen. Deze REST API volgt de Nederlandse API strategie. De data wordt dagelijks bijgewerkt om 05.30 uur. "
  version: "2.13.0"
servers:
  - url: "https://lod.onderwijsregistratie.nl/api/rio/v2"
    description: Productie server (gebruikt live data)
x-tagGroups:
  - name: Resources
    tags:
      - Opleidingsfasen
      - Opleidingsgroepen
      - Opleidingsonderdelen
      - Opleidingen
      - AangebodenOpleidingen
      - AangebodenOpleidingscohorten
      - Onderwijslocatiegebruiken
      - Onderwijslocaties
      - Contactadressen
      - OrganisatorischeEenheden
      - Opleidingserkenningen
      - Examenlicenties
      - Onderwijslicenties
      - Erkenningen
paths:
  /aangeboden-opleiding-cohorten:
    get:
      tags:
        - AangebodenOpleidingscohorten
      x-spring-paginated: true
      x-lod-paginated: true
      operationId: AangebodenOpleidingscohorten
      parameters:
        - in: query
          name: aangebodenOpleidingCohorttype
          schema:
            $ref: '#/components/schemas/AangebodenopleidingCohorttype'
        - in: query
          name: aanmeldperiode
          schema:
            type: string
            description: "De datum die wordt gehanteerd bij het nemen van een beslissing
            of het bepalen van een status."
            format: date
        - in: query
          name: beginAanmeldperiode
          schema:
            type: string
            description: "Is de eerste dag waarop een aspirant-student zich aan kan
            melden voor het betreffende cohort van een aangeboden opleiding. "
            format: date
        - in: query
          name: eindeAanmeldperiode
          schema:
            type: string
            description: "De laatste dag dat een student kan beginnen in een cohort
            van een aangeboden opleiding met een flexibele instroom. "
            format: date
        - $ref: "#/components/parameters/Status"
        - in: query
          name: page
          schema:
            type: integer
            description: "De bij de webservice opgevraagde resultatenpagina met een vooraf
            afgesproken aantal resultaten van de betreffende raadpleging"
            format: int32
        - in: query
          name: pageSize
          schema:
            maximum: 100
            minimum: 1
            type: integer
            description: "Het maximaal aantal resultaten dat getoond kan worden op een
            pagina."
            format: int64
        - $ref: "#/components/parameters/Sort"
      responses:
        200:
          description: "OK."
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AangebodenOpleidingscohort"
        400:
          description: "Bad request. Je request body bevat geen geldige JSON of de query wordt niet ondersteund door de API. "
        403:
          description: "Forbidden. Je hebt geen rechten om deze URL te benaderen. "
        404:
          description: "Niet gevonden."
        406:
          description: "Not Acceptable. Je hebt waarschijnlijk een gewenst formaat met de Accept header verstuurd welke niet ondersteund wordt. "
        503:
          description: "Service Unavailable. Er vindt mogelijk (gepland) onderhoud of een storing plaats."
  /aangeboden-opleiding-cohorten/{id}:
    get:
      tags:
        - AangebodenOpleidingscohorten
      operationId: AangebodenOpleidingscohort
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            minLength: 1
            maxLength: 100
      responses:
        200:
          description: "OK."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AangebodenOpleidingscohort"
        400:
          description: "Bad request. Je request body bevat geen geldige JSON of de query wordt niet ondersteund door de API. "
