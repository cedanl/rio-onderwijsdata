  /aangeboden-opleidingen:
    get:
      tags:
        - AangebodenOpleidingen
      x-spring-paginated: true
      x-lod-paginated: true
      operationId: AangebodenOpleidingen
      parameters:
        - in: query
          name: type
          schema:
            $ref: '#/components/schemas/Aangebodenopleidingtype'
        - in: query
          name: onderwijslocatieId
          required: false
          schema:
            maxLength: 7
            minLength: 7
            pattern: "(\\d{3}X\\d{3})"
            type: string
            description: "Een betekenisloze identifier voor een onderwijslocatie in de
            Registratie Instellingen en Opleidingen."
        - in: query
          name: datumGeldigOp
          schema:
            type: string
            description: De datum die het begin van de periode aangeeft (inclusief).
            format: date
        - in: query
          name: page
          schema:
            type: integer
            description: "De bij de webservice opgevraagde resultatenpagina met een vooraf
            afgesproken aantal resultaten van de betreffende raadpleging"
            format: int32
        - in: query
          name: pageSize
          schema:
            maximum: 100
            minimum: 1
            type: integer
            description: "Het maximaal aantal resultaten dat getoond kan worden op een
            pagina."
            format: int64
        - name: opleidingseenheidcode
          in: query
          schema:
            maxLength: 9
            minLength: 9
            pattern: "(\\d{4}O\\d{4})"
            type: string
            description: "Een betekenisloze identifier voor een opleidingseenheid in
            de Registratie Instellingen en Opleidingen."
        - name: organisatorischeEenheidcode
          in: query
          schema:
            maxLength: 7
            minLength: 7
            pattern: "\\d{3}[A-Z]{1}\\d{3}"
            type: string
            description: "Identificerend kenmerk voor een organisatorische eenheid ten
            behoeve van uitwisseling in de keten."
        - $ref: "#/components/parameters/Sort"
      responses:
        200:
          description: "OK."
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AangebodenOpleiding"
        400:
          description: "Bad request. Je request body bevat geen geldige JSON of de query wordt niet ondersteund door de API. "
        403:
          description: "Forbidden. Je hebt geen rechten om deze URL te benaderen. "
        406:
          description: "Not Acceptable. Je hebt waarschijnlijk een gewenst formaat met de Accept header verstuurd welke niet ondersteund wordt. "
        503:
          description: "Service Unavailable. Er vindt mogelijk (gepland) onderhoud of een storing plaats."
