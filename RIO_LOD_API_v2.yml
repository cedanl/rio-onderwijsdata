components:
  parameters:
    Sort:
      in: query
      name: sort
      schema:
        $ref: "#/components/schemas/Sort"
    Status:
      in: query
      name: status
      schema:
        $ref: "#/components/schemas/Status"
  schemas:
    Sort:
      properties:
        sort:
          type: string
          enum: [ id ]
          default: id
          minLength: 1
          maxLength: 100
    Status:
      type: string
      enum: [ O, G ]
    AangebodenBoOpleiding:
      x-class-extra-annotation: '@Relation(collectionRelation = "AangebodenOpleidingen")'
      allOf:
        - $ref: "#/components/schemas/AangebodenOpleiding"
      type: object
      required:
        - basisonderwijsdoelgroep
      properties:
        basisonderwijsdoelgroep:
          $ref: '#/components/schemas/DoelgroeponderwijsBO'
        bijzondereInrichting:
          $ref: '#/components/schemas/BijzondereInrichtingBo'
        doorlopendeLeerlijnBoVo:
          $ref: '#/components/schemas/OpleidingskenmerkcodeDoorlopendeLeerlijnenBoVo'
        onderwijsconcept:
          $ref: '#/components/schemas/OpleidingskenmerkcodePedagogischConcept'
    AangebodenHoOpleiding:
      x-class-extra-annotation: '@Relation(collectionRelation = "AangebodenOpleidingen")'
      allOf:
        - $ref: "#/components/schemas/AangebodenOpleiding"
      type: object
      required:
        - propedeutischeFase
        - studiekeuzecheck
        - vorm
      properties:
        eigennaamKort:
          type: string
          description: "Korte naam voor een opleidingseenheid zoals een opleiding, een opleidingsgroep, een opleidingsfase of een opleidingsonderdeel."
          minLength: 1
          maxLength: 40
        deficientie:
          $ref: '#/components/schemas/DeficientieMogelijk'
        versneldTraject:
          $ref: '#/components/schemas/VersneldHO'
        propedeutischeFase:
          $ref: '#/components/schemas/PropedeutischeFase'
        eisenWerkzaamheden:
          $ref: '#/components/schemas/EisenWerkzaamheden'
        buitenlandsePartner:
          type: array
          items:
            type: string
            description: "Beschrijving van de organisatie waarmee door een Nederlandse onderwijsbestuur wordt samengewerkt bij het verzorgen van een Joint Degree."
            maxLength: 250
        vorm:
          $ref: '#/components/schemas/OpleidingskenmerkcodeOnderwijsintensiteit'
